name: 🚀 Deploy

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎯 Deploy
    runs-on: ubuntu-latest
    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BWS_PROJECT_ID: ${{ secrets.BWS_PROJECT_ID }}
      GITHUB_API_TOKEN: ${{ secrets.GITHUB_API_TOKEN }}
    steps:
    
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip
     
      - name: 📦 Install Bitwarden Secrets Manager CLI
        run: |
          curl -Lso bws.zip https://github.com/bitwarden/sdk-sm/releases/download/bws-v2.0.0/bws-x86_64-unknown-linux-gnu-2.0.0.zip
          unzip -o bws.zip
          chmod +x bws
          sudo mv bws /usr/local/bin/bws
          rm bws.zip
          bws --version

      - name: 🔐 Load secrets + generate .env
        shell: bash
        run: |
          set -euo pipefail

          umask 077
          : > .env

          bws secret list "$BWS_PROJECT_ID" \
            | jq -c '.[] | select(.key != null and .value != null)' \
            | while read -r item; do
                key="$(echo "$item" | jq -r '.key')"
                value="$(echo "$item" | jq -r '.value')"

                # Maschera sempre
                echo "::add-mask::$value"

                if [[ "$value" == *$'\n'* ]]; then
                  # ✅ MULTILINE → formato speciale GitHub
                  {
                    echo "$key<<EOF"
                    echo "$value"
                    echo "EOF"
                  } >> "$GITHUB_ENV"
                else
                  # ✅ SINGLE LINE → safe
                  printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
                fi

                # .env → meglio sempre single-line (flatten)
                clean_value="$(printf '%s' "$value" | tr -d '\r' | tr '\n' ' ')"

                case "$key" in
                  FTP_*|BWS_*)
                    ;;
                  *)
                    printf '%s=%s\n' "$key" "$clean_value" >> .env
                    ;;
                esac

              done

          cat >> .env <<EOF

          APP_DEBUG=false
          APP_DOMAIN=${{ vars.APP_DOMAIN }}
          APP_URL=https://${{ vars.APP_DOMAIN }}

          ASSETS_VERSION=${{ vars.ASSETS_VERSION }}

          DB_CONNECTION_LOG=false

          EOF

      - name: Normalize FTP path
        shell: bash
        run: |
          set -euo pipefail
          
          path="${FTP_REMOTE_PATH:-}"
          [ -n "$path" ] || { echo "Missing FTP_REMOTE_PATH"; exit 1; }

          [[ "$path" != */ ]] && path="${path}/"

          echo "::add-mask::$path"
          printf 'FTP_REMOTE_PATH=%s\n' "$path" >> "$GITHUB_ENV"
          
      - name: 📦 Installa Pacchetti PHP
        run: composer install --no-dev --optimize-autoloader --no-scripts

      - name: 📦 Installa Pacchetti JS
        run: npm ci

      - name: 📂 Sincronizza file FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
            server: ${{ env.FTP_HOST }}
            username: ${{ env.FTP_USER }}
            password: ${{ env.FTP_PASSWORD }}
            port: ${{ env.FTP_PORT }}
            server-dir: ${{ env.FTP_REMOTE_PATH }}
            local-dir: ./
            exclude: |
              **/.git*
              **/.git*/**
              **/.github*
              **/.github/**
              **/.vscode/**
              **/composer.json
              **/composer.lock
              **/package.json
              **/package-lock.json
              **/node_modules/**
              *.md

      - name: 🗄️ Update App
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GITHUB_API_TOKEN:-}" ]; then
            echo "::error::Manca il secret GITHUB_API_TOKEN nei GitHub Secrets della repo."
            echo "::error::Aggiungilo con: gh secret set GITHUB_API_TOKEN --repo <owner>/<repo> --body \"<token>\""
            echo "::error::Il valore deve corrispondere a quello restituito da Wonder\\App\\Credentials::appToken() sull'app target."
            exit 1
          fi

          curl -fsS --retry 3 --retry-all-errors \
            -X POST "https://${{ vars.APP_DOMAIN }}/api/app/update/" \
            -H "Authorization: Bearer $GITHUB_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"release_id\":\"$GITHUB_SHA\",\"source\":\"github\"}"