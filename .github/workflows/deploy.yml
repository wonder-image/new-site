name: 🚀 Deploy

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎯 Deploy
    runs-on: ubuntu-latest
    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BWS_PROJECT_ID: ${{ secrets.BWS_PROJECT_ID }}
      # Bearer per /api/app/update/. Sincronizzato da `forge provision`
      # come secret della repo (i nomi GITHUB_* non sono ammessi da
      # GitHub, quindi il vecchio GITHUB_API_TOKEN è rinominato qui).
      APP_DEPLOY_TOKEN: ${{ secrets.APP_DEPLOY_TOKEN }}
    steps:
    
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip
     
      - name: 📦 Install Bitwarden Secrets Manager CLI
        run: |
          curl -Lso bws.zip https://github.com/bitwarden/sdk-sm/releases/download/bws-v2.0.0/bws-x86_64-unknown-linux-gnu-2.0.0.zip
          unzip -o bws.zip
          chmod +x bws
          sudo mv bws /usr/local/bin/bws
          rm bws.zip
          bws --version

      - name: 🔐 Load secrets + generate .env
        shell: bash
        run: |
          set -euo pipefail

          umask 077
          : > .env

          bws secret list "$BWS_PROJECT_ID" \
            | jq -c '.[] | select(.key != null and .value != null)' \
            | while read -r item; do
                key="$(echo "$item" | jq -r '.key')"
                value="$(echo "$item" | jq -r '.value')"

                # Maschera sempre
                echo "::add-mask::$value"

                if [[ "$value" == *$'\n'* ]]; then
                  # ✅ MULTILINE → formato speciale GitHub
                  {
                    echo "$key<<EOF"
                    echo "$value"
                    echo "EOF"
                  } >> "$GITHUB_ENV"
                else
                  # ✅ SINGLE LINE → safe
                  printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
                fi

                # .env → meglio sempre single-line (flatten)
                clean_value="$(printf '%s' "$value" | tr -d '\r' | tr '\n' ' ')"

                case "$key" in
                  FTP_*|BWS_*)
                    ;;
                  *)
                    printf '%s=%s\n' "$key" "$clean_value" >> .env
                    ;;
                esac

              done

          cat >> .env <<EOF

          APP_DEBUG=false
          APP_DOMAIN=${{ vars.APP_DOMAIN }}
          APP_URL=https://${{ vars.APP_DOMAIN }}

          ASSETS_VERSION=${{ vars.ASSETS_VERSION }}

          DB_CONNECTION_LOG=false

          EOF

      - name: Normalize FTP path
        shell: bash
        run: |
          set -euo pipefail
          
          path="${FTP_REMOTE_PATH:-}"
          [ -n "$path" ] || { echo "Missing FTP_REMOTE_PATH"; exit 1; }

          [[ "$path" != */ ]] && path="${path}/"

          echo "::add-mask::$path"
          printf 'FTP_REMOTE_PATH=%s\n' "$path" >> "$GITHUB_ENV"
          
      - name: 📦 Installa Pacchetti PHP
        run: composer install --no-dev --optimize-autoloader --no-scripts

      - name: 📦 Installa Pacchetti JS
        run: npm ci

      - name: 🧱 Build static files (handler/index.php, .htaccess)
        run: php forge build

      - name: 📂 Sincronizza file FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
            server: ${{ env.FTP_HOST }}
            username: ${{ env.FTP_USER }}
            password: ${{ env.FTP_PASSWORD }}
            port: ${{ env.FTP_PORT }}
            server-dir: ${{ env.FTP_REMOTE_PATH }}
            local-dir: ./
            exclude: |
              **/.git*
              **/.git*/**
              **/.github*
              **/.github/**
              **/.vscode/**
              **/composer.json
              **/composer.lock
              **/package.json
              **/package-lock.json
              **/node_modules/**
              forge
              *.md

      - name: 🗄️ Update App
        shell: bash
        run: |
          set -euo pipefail

          # Fallback al vecchio nome per non rompere siti che ancora hanno
          # GITHUB_API_TOKEN nel .env locale ma non hanno ancora rilanciato
          # `forge provision` aggiornato.
          deploy_token="${APP_DEPLOY_TOKEN:-${GITHUB_API_TOKEN:-}}"

          if [ -z "$deploy_token" ]; then
            echo "::error::Manca il secret APP_DEPLOY_TOKEN nei GitHub Secrets della repo."
            echo "::error::Generalo con: php forge provision (locale)"
            echo "::error::Oppure manualmente: gh secret set APP_DEPLOY_TOKEN --repo <owner>/<repo> --body \"\$(php -r 'echo bin2hex(random_bytes(32));')\""
            exit 1
          fi

          # `-fsS` nasconde il body in caso di error HTTP. Lo togliamo e
          # gestiamo manualmente: catturiamo body + status, li stampiamo,
          # poi falliamo lo step se status >= 400. Così il messaggio JSON
          # restituito da /api/app/update/ (anche in caso di 500 con
          # exception interna) finisce nei log dell'Action.
          response_body=$(mktemp)
          status=$(curl -sS --retry 3 --retry-all-errors \
            -o "$response_body" -w '%{http_code}' \
            -X POST "https://${{ vars.APP_DOMAIN }}/api/app/update/" \
            -H "Authorization: Bearer $deploy_token" \
            -H "Content-Type: application/json" \
            -d "{\"release_id\":\"$GITHUB_SHA\",\"source\":\"github\"}" \
            || echo '000')

          echo "HTTP status: $status"
          echo "--- response body ---"
          cat "$response_body" || true
          echo
          echo "--- end response body ---"

          if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
            echo "::error::Update App ha risposto $status. Controlla il body sopra per il dettaglio dell'errore."
            exit 1
          fi