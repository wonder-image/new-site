# Override run-time per agenti shippati da framework/moduli.
#
# Solo settings di esecuzione (model, temperature, max_tokens, tools,
# provider, timeout_seconds, max_retries). Il PROMPT NON si overrida da
# qui: per cambiare il prompt di un agente shippato altrove, metti un
# `prompt.md` in `ai/agents/<slug>/` e la cascade file-level lo prende
# automaticamente.
#
# Esempio:
#
# seo-meta-writer:
#   model: claude-haiku-4         # locale = modello più economico
#   temperature: 0.3
#
# rsvp-reminder-composer:
#   max_tokens: 4000              # questo agente del modulo rsvp genera
#                                 # email lunghe, alzo il limite
